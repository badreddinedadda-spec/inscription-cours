<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mot de passe oublié — HighTech EDU</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:   #1B3A6B;
      --blue-m: #2d5299;
      --white:  #FFFFFF;
      --bg:     #F7F9FC;
      --border: #E2E8F0;
      --text:   #0F172A;
      --muted:  #64748B;
      --soft:   #94A3B8;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 14px; width: 100%; max-width: 400px;
      padding: 2.5rem 2.25rem;
      box-shadow: 0 4px 24px rgba(15,23,42,0.06);
    }
    .logo { display: flex; align-items: baseline; gap: 7px; text-decoration: none; margin-bottom: 2rem; }
    .logo-name { font-family: 'Instrument Serif', serif; font-size: 1.1rem; color: var(--blue); }
    .logo-sep  { color: var(--border); }
    .logo-sub  { font-size: 0.68rem; color: var(--soft); }
    h1 { font-family: 'Instrument Serif', serif; font-size: 1.75rem; color: var(--text); letter-spacing: -0.3px; margin-bottom: 0.4rem; }
    .sub { font-size: 0.84rem; color: var(--muted); font-weight: 300; margin-bottom: 1.75rem; line-height: 1.6; }
    .alert { border-radius: 7px; padding: 0.65rem 0.9rem; font-size: 0.82rem; margin-bottom: 1.25rem; }
    .alert-err { background: #FFF5F5; border: 1px solid #FECACA; color: #991B1B; }
    .alert-ok  { background: #F0FDF4; border: 1px solid #86EFAC; color: #166534; }
    .field { margin-bottom: 1.25rem; }
    .field label { display: block; font-size: 0.77rem; font-weight: 500; color: var(--muted); margin-bottom: 0.3rem; }
    .field input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 0.65rem 0.9rem; border-radius: 7px;
      font-size: 0.9rem; outline: none; font-family: inherit; transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(27,58,107,0.08); background: var(--white); }
    .field input::placeholder { color: var(--soft); }
    .btn {
      width: 100%; background: var(--blue); color: var(--white);
      border: none; padding: 0.75rem; border-radius: 8px;
      font-size: 0.92rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background 0.15s;
    }
    .btn:hover { background: var(--blue-m); }
    .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 0.73rem; color: var(--soft); }
    .back {
      display: block; text-align: center; padding: 0.6rem;
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--muted); text-decoration: none; font-size: 0.83rem;
      font-weight: 500; transition: all 0.15s;
    }
    .back:hover { border-color: var(--blue); color: var(--blue); }
    .note { text-align: center; font-size: 0.72rem; color: var(--soft); margin-top: 1.5rem; }
  </style>
</head>
<body>
<div class="card">

  <a class="logo" th:href="@{/}" href="/">
    <span class="logo-name">HighTech EDU</span>
    <span class="logo-sep">·</span>
    <span class="logo-sub">Administration</span>
  </a>

  <h1>Mot de passe oublié</h1>
  <p class="sub">Entrez votre adresse e-mail d'administrateur. Un lien de réinitialisation vous sera envoyé.</p>

  <div class="alert alert-err" th:if="${error}"   th:text="${error}"></div>
  <div class="alert alert-ok"  th:if="${success}" th:text="${success}"></div>

  <!--
    PAS de token CSRF — /forgot-password est dans ignoringRequestMatchers
    Le token CSRF causait le 404 sur Railway
  -->
  <form action="/forgot-password" method="post">
    <div class="field">
      <label>Adresse e-mail</label>
      <input type="email" name="email"
             placeholder="badr-admin@hightech.edu"
             required autofocus autocomplete="email"/>
    </div>
    <button type="submit" class="btn">Envoyer le lien de réinitialisation</button>
  </form>

  <div class="divider"><span>ou</span></div>
  <a class="back" th:href="@{/login}" href="/login">← Retour à la connexion</a>
  <p class="note">HighTech EDU © 2025</p>
</div>
</body>
</html>
