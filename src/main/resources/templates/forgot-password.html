<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mot de passe oublié — EduManager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent:#1B3A6B; --accent-h:#142D56; --border:#E2E8F0; --text:#0F172A; --muted:#64748B; }
    body { font-family:'Inter',sans-serif; min-height:100vh; background:#F7F9FC; display:flex; align-items:center; justify-content:center; -webkit-font-smoothing:antialiased; }
    .card { background:#fff; border:1px solid var(--border); border-radius:10px; padding:2.25rem 2rem; width:100%; max-width:370px; }
    .logo { font-size:1rem; font-weight:700; color:var(--accent); text-align:center; margin-bottom:0.3rem; }
    .title { font-size:1.2rem; font-weight:700; color:var(--text); text-align:center; margin-bottom:0.3rem; letter-spacing:-0.2px; }
    .desc { text-align:center; color:var(--muted); font-size:0.83rem; margin-bottom:1.75rem; line-height:1.6; }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:0.78rem; font-weight:500; color:var(--muted); margin-bottom:0.3rem; }
    .form-group input { width:100%; padding:0.58rem 0.85rem; background:#fff; border:1px solid var(--border); border-radius:7px; color:var(--text); font-size:0.88rem; font-family:inherit; outline:none; transition:border-color 0.15s; }
    .form-group input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(27,58,107,0.08); }
    .form-group input::placeholder { color:#CBD5E1; }
    .btn { width:100%; padding:0.65rem; background:var(--accent); color:#fff; border:none; border-radius:7px; font-size:0.88rem; font-weight:600; font-family:inherit; cursor:pointer; margin-top:0.25rem; }
    .btn:hover { background:var(--accent-h); }
    .alert { padding:0.65rem 0.9rem; border-radius:7px; font-size:0.83rem; margin-bottom:1.1rem; text-align:center; }
    .alert-danger  { background:#FFF5F5; color:#991B1B; border:1px solid #FECACA; }
    .alert-success { background:#F0FDF4; color:#166534; border:1px solid #86EFAC; }
    .back-link { display:block; text-align:center; margin-top:1.25rem; font-size:0.8rem; color:var(--muted); text-decoration:none; }
    .back-link:hover { color:var(--accent); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">EduManager</div>
  <h1 class="title">Mot de passe oublié</h1>
  <p class="desc">Entrez votre e-mail d'administrateur. Un lien de réinitialisation vous sera envoyé.</p>

  <div class="alert alert-danger"  th:if="${error}"   th:text="${error}"></div>
  <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

  <form th:action="@{/forgot-password}" method="post">
    <div class="form-group">
      <label>Adresse e-mail</label>
      <input type="email" name="email" placeholder="Adresse e-mail" autofocus/>
    </div>
    <button type="submit" class="btn">Envoyer le lien</button>
  </form>

  <a th:href="@{/login}" class="back-link">← Retour à la connexion</a>
</div>
</body>
</html>
