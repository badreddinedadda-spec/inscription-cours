<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Étudiants du cours — EduManager</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav>
  <a th:href="@{/dashboard}" class="brand">EduManager</a>
  <a th:href="@{/etudiants}" sec:authorize="hasRole('ADMIN')">Étudiants</a>
  <a th:href="@{/cours}" class="active">Cours</a>
  <a th:href="@{/inscriptions}">Inscriptions</a>
  <span style="margin-left:auto;color:var(--muted);font-size:0.83rem;" sec:authentication="name"></span>
  <form th:action="@{/logout}" method="post" style="margin:0;">
    <button type="submit" style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:0.3rem 0.85rem;border-radius:var(--radius);cursor:pointer;font-size:0.82rem;font-family:inherit;">Déconnexion</button>
  </form>
</nav>
<div class="container">
  <div class="page-header">
    <h1>Étudiants inscrits — <span th:text="${cours.titre}"></span></h1>
    <a th:href="@{/cours}" class="btn btn-secondary">← Retour</a>
  </div>

  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.5rem;display:flex;gap:2.5rem;">
    <div>
      <div style="font-size:0.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;">Enseignant</div>
      <div th:text="${cours.enseignant}"></div>
    </div>
    <div>
      <div style="font-size:0.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;">Durée</div>
      <div th:text="${cours.duree + ' heures'}"></div>
    </div>
    <div>
      <div style="font-size:0.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;">Étudiants inscrits</div>
      <div style="font-weight:700;color:var(--accent);" th:text="${#lists.size(inscriptions)}"></div>
    </div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr><th>#</th><th>Nom</th><th>Prénom</th><th>E-mail</th><th>Date d'inscription</th></tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(inscriptions)}">
          <td colspan="5"><div class="empty-state"><div class="icon">—</div><div>Aucun étudiant inscrit à ce cours.</div></div></td>
        </tr>
        <tr th:each="inscription : ${inscriptions}">
          <td style="color:var(--muted);font-size:0.8rem;" th:text="${inscription.etudiant.id}"></td>
          <td style="font-weight:600;" th:text="${inscription.etudiant.nom}"></td>
          <td th:text="${inscription.etudiant.prenom}"></td>
          <td style="color:var(--muted);" th:text="${inscription.etudiant.email}"></td>
          <td style="color:var(--muted);" th:text="${inscription.dateInscription}"></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
