<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Cours — EduManager</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style>
    .form-card { max-width: 800px; }
    .form-section-title {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #1B3A6B;
      border-bottom: 2px solid #EEF3FF; padding-bottom: 0.5rem;
      margin: 1.5rem 0 1rem;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group label { font-size: 0.8rem; font-weight: 500; color: #64748B; display: block; margin-bottom: 0.3rem; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 0.6rem 0.85rem;
      border: 1.5px solid #E2E8F0; border-radius: 7px;
      font-size: 0.85rem; font-family: inherit;
      transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none; border-color: #1B3A6B;
      box-shadow: 0 0 0 3px rgba(27,58,107,0.08);
    }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .badge-info {
      background: #EEF3FF; color: #1B3A6B;
      font-size: 0.75rem; padding: 0.25rem 0.75rem;
      border-radius: 20px; font-weight: 500;
    }
  </style>
</head>
<body>
<nav>
  <a th:href="@{/dashboard}" class="brand">EduManager</a>
  <a th:href="@{/etudiants}" sec:authorize="hasRole('ADMIN')">Étudiants</a>
  <a th:href="@{/cours}" class="active">Cours</a>
  <a th:href="@{/inscriptions}">Inscriptions</a>
  <span style="margin-left:auto;color:var(--muted);font-size:0.83rem;" sec:authentication="name"></span>
  <form th:action="@{/logout}" method="post" style="margin:0;">
    <button type="submit" style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:0.3rem 0.85rem;border-radius:var(--radius);cursor:pointer;font-size:0.82rem;font-family:inherit;">Déconnexion</button>
  </form>
</nav>
<div class="container">
  <div class="page-header">
    <h1 th:text="${cours.id == null} ? 'Nouveau cours' : 'Modifier le cours'">Cours</h1>
    <a th:href="@{/cours}" class="btn btn-secondary">← Retour</a>
  </div>
  <div class="form-card">
    <form th:action="@{/cours/sauvegarder}" th:object="${cours}" method="post">
      <input type="hidden" th:field="*{id}"/>

      <!-- INFORMATIONS GENERALES -->
      <div class="form-section-title">Informations générales</div>

      <div class="form-group">
        <label>Titre du cours *</label>
        <input type="text" th:field="*{titre}" placeholder="Ex: Génie Logiciel et DevOps"/>
        <span class="error-msg" th:if="${#fields.hasErrors('titre')}" th:errors="*{titre}"></span>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Enseignant *</label>
          <input type="text" th:field="*{enseignant}" placeholder="Nom de l'enseignant"/>
          <span class="error-msg" th:if="${#fields.hasErrors('enseignant')}" th:errors="*{enseignant}"></span>
        </div>
        <div class="form-group">
          <label>Durée (heures) *</label>
          <input type="number" th:field="*{duree}" min="1" placeholder="Ex: 40"/>
          <span class="error-msg" th:if="${#fields.hasErrors('duree')}" th:errors="*{duree}"></span>
        </div>
      </div>

      <div class="form-group">
        <label>Niveau</label>
        <select th:field="*{niveau}">
          <option value="">— Sélectionner un niveau —</option>
          <option value="Bac+2">Bac+2</option>
          <option value="Bac+3">Bac+3</option>
          <option value="Bac+5">Bac+5 (Master)</option>
          <option value="Formation continue">Formation continue</option>
          <option value="Tous niveaux">Tous niveaux</option>
        </select>
      </div>

      <!-- SYLLABUS -->
      <div class="form-section-title">Syllabus du cours</div>

      <div class="form-group">
        <label>Description générale</label>
        <textarea th:field="*{description}" placeholder="Présentation générale du cours..."></textarea>
      </div>

      <div class="form-group">
        <label>Objectifs pédagogiques</label>
        <textarea th:field="*{objectifs}" placeholder="À la fin de ce cours, l'étudiant sera capable de..."></textarea>
      </div>

      <div class="form-group">
        <label>Prérequis</label>
        <textarea th:field="*{prerequis}" placeholder="Connaissances requises avant d'intégrer ce cours..."></textarea>
      </div>

      <div class="form-group">
        <label>Programme détaillé (Syllabus)</label>
        <textarea th:field="*{programme}" rows="6"
                  placeholder="Module 1: Introduction&#10;Module 2: ...&#10;Module 3: ..."></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Sauvegarder</button>
        <a th:href="@{/cours}" class="btn btn-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
