<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nouveau mot de passe — EduManager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent:#1B3A6B; --accent-h:#142D56; --border:#E2E8F0; --text:#0F172A; --muted:#64748B; }
    body { font-family:'Inter',sans-serif; min-height:100vh; background:#F7F9FC; display:flex; align-items:center; justify-content:center; -webkit-font-smoothing:antialiased; }
    .card { background:#fff; border:1px solid var(--border); border-radius:10px; padding:2.25rem 2rem; width:100%; max-width:370px; }
    .logo  { font-size:1rem; font-weight:700; color:var(--accent); text-align:center; margin-bottom:0.3rem; }
    .title { font-size:1.2rem; font-weight:700; color:var(--text); text-align:center; margin-bottom:1.5rem; letter-spacing:-0.2px; }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:0.78rem; font-weight:500; color:var(--muted); margin-bottom:0.3rem; }
    .form-group input { width:100%; padding:0.58rem 0.85rem; background:#fff; border:1px solid var(--border); border-radius:7px; color:var(--text); font-size:0.88rem; font-family:inherit; outline:none; transition:border-color 0.15s; }
    .form-group input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(27,58,107,0.08); }
    .form-group input::placeholder { color:#CBD5E1; }
    .strength { height:3px; border-radius:3px; margin-top:6px; background:var(--border); overflow:hidden; }
    .strength-bar { height:100%; border-radius:3px; width:0; transition:width 0.25s, background 0.25s; }
    .btn { width:100%; padding:0.65rem; background:var(--accent); color:#fff; border:none; border-radius:7px; font-size:0.88rem; font-weight:600; font-family:inherit; cursor:pointer; margin-top:0.25rem; }
    .btn:hover { background:var(--accent-h); }
    .alert-danger { padding:0.65rem 0.9rem; border-radius:7px; font-size:0.83rem; margin-bottom:1.1rem; text-align:center; background:#FFF5F5; color:#991B1B; border:1px solid #FECACA; }
    .expired-box { text-align:center; padding:1.5rem 0; color:var(--muted); }
    .expired-box .icon { font-size:2rem; margin-bottom:0.75rem; display:block; }
    .back-link { display:block; text-align:center; margin-top:1.25rem; font-size:0.8rem; color:var(--muted); text-decoration:none; }
    .back-link:hover { color:var(--accent); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">EduManager</div>
  <h1 class="title">Nouveau mot de passe</h1>

  <div class="alert-danger" th:if="${error}" th:text="${error}"></div>

  <!-- Lien expiré -->
  <div class="expired-box" th:if="${!valid}">
    <span class="icon">⏱</span>
    <p>Ce lien est invalide ou a expiré.</p>
    <a th:href="@{/forgot-password}" class="back-link" style="margin-top:0.75rem;">Demander un nouveau lien</a>
  </div>

  <!-- Formulaire valide -->
  <form th:if="${valid}" th:action="@{/reset-password}" method="post">
    <input type="hidden" name="token" th:value="${token}"/>
    <div class="form-group">
      <label>Nouveau mot de passe</label>
      <input type="password" name="password" placeholder="Nouveau mot de passe" oninput="checkStrength(this.value)" autofocus/>
      <div class="strength"><div class="strength-bar" id="str-bar"></div></div>
    </div>
    <div class="form-group">
      <label>Confirmer le mot de passe</label>
      <input type="password" name="confirmPassword" placeholder="Confirmer le mot de passe"/>
    </div>
    <button type="submit" class="btn">Mettre à jour</button>
  </form>

  <a th:href="@{/login}" class="back-link">← Retour à la connexion</a>
</div>
<script>
function checkStrength(val) {
  const bar = document.getElementById('str-bar');
  let score = 0;
  if (val.length >= 6) score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const colors = ['#EF4444','#F59E0B','#F59E0B','#22C55E','#22C55E'];
  const widths = ['20%','40%','60%','80%','100%'];
  bar.style.width  = score > 0 ? widths[score-1]  : '0';
  bar.style.background = score > 0 ? colors[score-1] : 'transparent';
}
</script>
</body>
</html>
